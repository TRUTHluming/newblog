<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <style>
      .title { font: 700 44px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #111827; }
      .subtitle { font: 400 24px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #374151; }
      .axis { font: 700 28px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .label { font: 600 22px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .cell { font: 600 20px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #4b5563; }
      .formula { font: 400 24px "Consolas", "JetBrains Mono", monospace; fill: #111827; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="900" fill="#f9fafb"/>

  <text x="600" y="72" text-anchor="middle" class="title">4变量卡诺图结构示意</text>
  <text x="600" y="110" text-anchor="middle" class="subtitle">用于说明分组结构（列/行均采用Gray Code）</text>

  <g transform="translate(280,180)">
    <line x1="-92" y1="-92" x2="-8" y2="-8" stroke="#111827" stroke-width="3"/>
    <line x1="-92" y1="-92" x2="-8" y2="-8" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="-138" y="-104" class="axis">AB</text>
    <text x="-52" y="-40" class="axis">CD</text>

    <rect x="0" y="0" width="640" height="640" fill="#ffffff" stroke="#111827" stroke-width="4"/>

    <line x1="160" y1="0" x2="160" y2="640" stroke="#111827" stroke-width="2.5"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#111827" stroke-width="2.5"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="#111827" stroke-width="2.5"/>

    <line x1="0" y1="160" x2="640" y2="160" stroke="#111827" stroke-width="2.5"/>
    <line x1="0" y1="320" x2="640" y2="320" stroke="#111827" stroke-width="2.5"/>
    <line x1="0" y1="480" x2="640" y2="480" stroke="#111827" stroke-width="2.5"/>

    <text x="80" y="-24" text-anchor="middle" class="label">00</text>
    <text x="240" y="-24" text-anchor="middle" class="label">01</text>
    <text x="400" y="-24" text-anchor="middle" class="label">11</text>
    <text x="560" y="-24" text-anchor="middle" class="label">10</text>

    <text x="-24" y="88" text-anchor="end" class="label">00</text>
    <text x="-24" y="248" text-anchor="end" class="label">01</text>
    <text x="-24" y="408" text-anchor="end" class="label">11</text>
    <text x="-24" y="568" text-anchor="end" class="label">10</text>

    <g class="cell" text-anchor="middle">
      <text x="80" y="90">m0</text>
      <text x="240" y="90">m1</text>
      <text x="400" y="90">m3</text>
      <text x="560" y="90">m2</text>

      <text x="80" y="250">m4</text>
      <text x="240" y="250">m5</text>
      <text x="400" y="250">m7</text>
      <text x="560" y="250">m6</text>

      <text x="80" y="410">m12</text>
      <text x="240" y="410">m13</text>
      <text x="400" y="410">m15</text>
      <text x="560" y="410">m14</text>

      <text x="80" y="570">m8</text>
      <text x="240" y="570">m9</text>
      <text x="400" y="570">m11</text>
      <text x="560" y="570">m10</text>
    </g>
  </g>

  <text x="600" y="858" text-anchor="middle" class="formula">F(A,B,C,D) = Σm(...)</text>
</svg>
